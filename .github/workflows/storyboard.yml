name: storyboard

# Storyboard CI gate (per D8). Boots `npx adcp mock-server <specialism>`
# as a sidecar process for each AdCP-defined specialism, then runs the
# storyboard tests against them.
#
# Today this is the gate shell — there's one MockServerReachableTest in
# adcp-testing that proves the sidecar booted. As the `testing` track
# lands the real StoryboardRunner, that runner replaces this assertion
# while the workflow shape stays unchanged.
#
# The pinned @adcp/sdk version in package-lock.json becomes the
# conformance oracle — bumping it is a deliberate PR (D8).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  storyboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Set up Node.js for mock-server sidecar
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install @adcp/sdk
        # The pinned version is what conformance is graded against. CI
        # locks the version through package-lock.json (npm ci is
        # reproducible). Bumping the pin is a deliberate PR.
        run: npm ci

      - name: Boot mock-server (sales-guaranteed specialism)
        # One specialism is enough for the gate shell. The testing track
        # adds the other specialisms (signal-marketplace, sales-social,
        # creative-template, sponsored-intelligence, sales-non-guaranteed,
        # creative-ad-server) on the port range starting at 4500.
        run: |
          npx adcp mock-server sales-guaranteed --port 4500 \
            > mock-server.log 2>&1 &
          echo $! > mock-server.pid
          # Wait for it to come up (up to 30s).
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4500/ -o /dev/null 2>&1; then
              echo "mock-server up after ${i}s"; break
            fi
            sleep 1
          done

      - name: Run storyboard tests
        env:
          ADCP_MOCK_SERVER_URL: http://localhost:4500
        run: ./gradlew :adcp-testing:test --info

      - name: Capture mock-server logs on failure
        if: always()
        run: |
          if [ -f mock-server.log ]; then
            echo "::group::mock-server.log"
            cat mock-server.log
            echo "::endgroup::"
          fi

      - name: Stop mock-server
        if: always()
        run: |
          if [ -f mock-server.pid ]; then
            kill "$(cat mock-server.pid)" || true
          fi
