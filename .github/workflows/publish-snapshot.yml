name: publish-snapshot

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  publish-snapshot:
    name: Publish SNAPSHOT to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Install cosign
        # Schema-bundle fetcher (per D4) shells out to `cosign verify-blob`.
        uses: sigstore/cosign-installer@v3

      - name: Check version is a SNAPSHOT
        # D6: v0.1 and v0.2 ship as SNAPSHOT only. Skip publish if main has
        # been bumped to a release version (release.yml handles that path).
        id: version-check
        run: |
          VERSION=$(./gradlew properties -q --no-configuration-cache | grep '^version:' | awk '{print $2}')
          echo "version=$VERSION"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION is not a SNAPSHOT — skipping snapshot publish."
          fi

      - name: Publish SNAPSHOT
        # vanniktech routes -SNAPSHOT versions to the Central Portal snapshot
        # repository (central.sonatype.com/repository/maven-snapshots/)
        # automatically when publishToMavenCentral is run — no staging/release
        # step needed. Per vanniktech docs, publishToMavenCentral is the
        # correct task for both snapshot and manual-release publishing.
        if: steps.version-check.outputs.is_snapshot == 'true'
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
