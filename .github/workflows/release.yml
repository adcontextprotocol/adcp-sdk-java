# Maven Central release workflow (per D6 / D18 / D20).
#
# Triggered by a GitHub Release (created by Changesets or manually). Builds
# all modules, signs artifacts with GPG, and publishes to Sonatype OSSRH
# staging. The staging repo is then closed and released (promoted to
# Maven Central).
#
# Prerequisites (foundation admin actions per D6/D20):
#   1. Sonatype OSSRH namespace `org.adcontextprotocol` claimed via DNS TXT
#   2. GPG key generated and published to key servers
#   3. GitHub repo secrets configured:
#      - OSSRH_USERNAME   (Sonatype token user)
#      - OSSRH_PASSWORD   (Sonatype token password)
#      - GPG_KEY_ID       (last 8 hex chars of GPG key)
#      - GPG_PASSPHRASE   (GPG key passphrase)
#      - GPG_SECRET_KEY   (ASCII-armored GPG private key)
#
# First actual publish: v0.3 alpha (per D6). Until then this workflow
# exists but secrets won't be configured, so it will fail gracefully.

name: Release to Maven Central

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Import GPG key
        if: env.GPG_SECRET_KEY != ''
        env:
          GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_SECRET_KEY" | gpg --batch --import
          echo "GPG key imported"

      - name: Publish to Maven Central
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./gradlew publishMavenJavaPublicationToOssrhRepository \
            -PossrhUsername="$OSSRH_USERNAME" \
            -PossrhPassword="$OSSRH_PASSWORD" \
            -Psigning.keyId="$GPG_KEY_ID" \
            -Psigning.password="$GPG_PASSPHRASE" \
            -Psigning.secretKeyRingFile="$HOME/.gnupg/secring.gpg" \
            --no-daemon --stacktrace
